name: Run Crawler

on:
  schedule:
    - cron: '0 */6 * * *'  # 6시간마다 실행
  workflow_dispatch:       # 수동 실행 가능

concurrency:
  group: crawler
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        run: python crawler/crawler.py

      - name: Check for posts.json changes
        id: changes
        run: |
          if git diff --quiet -- public/data/posts.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push posts.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --global user.name "crawler-bot"
          git config --global user.email "bot@example.com"
          git add public/data/posts.json
          git commit -m "Update posts.json"
          git push
